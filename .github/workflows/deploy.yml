name: Deploy (prod)

# Push to deploy/prod -> build the single hub image, push to GHCR, then
# pull+recreate the sys0 container on jp09 via the Portainer-proxied Docker API.
#
# NOTE: sys0 is a NON-git (raw compose) Portainer stack, so the old stack
# webhook never repulls a new image when only the code (not the compose)
# changes — it returned HTTP 404 because no webhook is configured on the stack
# at all. The reliable path for "code changed, compose unchanged" is to pull
# :latest and recreate the container directly. See skill sys0-agent-hub-dev /
# references/portainer-api-workflow.md.
on:
  push:
    branches: [deploy/prod]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: v
        run: echo "version=$(date -u +%Y%m%d%H%M)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VERSION=${{ steps.v.outputs.version }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.v.outputs.version }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull + recreate sys0 container on jp09 (Portainer Docker API)
        env:
          PORTAINER_URL: https://portainer.rockchin.top
          PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
          ENDPOINT: "22"
          CONTAINER: sys0
        run: |
          if [ -z "$PORTAINER_API_KEY" ]; then
            echo "::error::PORTAINER_API_KEY secret not set — image pushed but redeploy skipped."
            exit 1
          fi
          python3 .github/scripts/portainer_redeploy.py
