name: Deploy (prod)

# GitOps deploy model:
#   1. Build the single hub image (web console embedded) and push to GHCR.
#   2. Trigger the Portainer stack webhook, which force-pulls the new :latest
#      image and redeploys the git-managed `sys0` stack on jp09.
#
# The `sys0` stack (Portainer id 135, endpoint 22) is a GIT REPOSITORY stack
# backed by RockChinQ/server-deploy
# (servers/jp-tyo-churros-09/sys0/docker-compose.yaml), with auto-update
# webhook + forcePullImage enabled. Compose changes are picked up from git on
# redeploy; image-only changes are pulled because the webhook forces a pull.
# This replaces the old portainer_redeploy.py stop-then-recreate hack (which
# could take the hub down on a slow GHCR pull).
on:
  push:
    branches: [deploy/prod]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: v
        run: echo "version=$(date -u +%Y%m%d%H%M)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VERSION=${{ steps.v.outputs.version }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.v.outputs.version }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Portainer GitOps redeploy (webhook, force-pull image)
        env:
          PORTAINER_WEBHOOK: ${{ secrets.PORTAINER_WEBHOOK }}
        run: |
          if [ -z "$PORTAINER_WEBHOOK" ]; then
            echo "::error::PORTAINER_WEBHOOK secret not set — image pushed but redeploy skipped."
            exit 1
          fi
          # The Portainer stack webhook force-pulls the new :latest and
          # redeploys the git-managed sys0 stack. It returns 204 on success.
          # Retry a few times: jp09->Portainer or Portainer->ghcr.io can hit a
          # transient TLS-handshake timeout on the image pull.
          ok=0
          for i in 1 2 3 4 5; do
            code=$(curl -sS -o /tmp/wh.out -w '%{http_code}' -X POST "$PORTAINER_WEBHOOK" || echo 000)
            echo "==> webhook attempt $i -> HTTP $code"
            if [ "$code" = "204" ] || [ "$code" = "200" ]; then ok=1; break; fi
            cat /tmp/wh.out 2>/dev/null || true
            sleep 10
          done
          if [ "$ok" != "1" ]; then
            echo "::error::Portainer webhook did not return 2xx after retries."
            exit 1
          fi
          echo "==> redeploy triggered OK"
