name: Deploy (prod)

# GitOps deploy model:
#   1. Build the single hub image (web console embedded) and push to GHCR.
#   2. Trigger the Portainer stack webhook, which force-pulls the new :latest
#      image and redeploys the git-managed `sys0` stack on jp09.
#
# The `sys0` stack (Portainer id 135, endpoint 22) is a GIT REPOSITORY stack
# backed by RockChinQ/server-deploy
# (servers/jp-tyo-churros-09/sys0/docker-compose.yaml), with auto-update
# webhook + forcePullImage enabled. Compose changes are picked up from git on
# redeploy; image-only changes are pulled because the webhook forces a pull.
# This replaces the old portainer_redeploy.py stop-then-recreate hack (which
# could take the hub down on a slow GHCR pull).
on:
  push:
    branches: [deploy/prod]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: v
        run: echo "version=$(date -u +%Y%m%d%H%M)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VERSION=${{ steps.v.outputs.version }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.v.outputs.version }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to jp09 via Portainer GitOps (explicit pull + git redeploy)
        env:
          PORTAINER_URL: https://portainer.rockchin.top
          PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
          SERVER_DEPLOY_PAT: ${{ secrets.SERVER_DEPLOY_PAT }}
          ENDPOINT: "22"
          STACK: "135"
          IMAGE: ghcr.io/${{ github.repository }}
        run: |
          if [ -z "$PORTAINER_API_KEY" ] || [ -z "$SERVER_DEPLOY_PAT" ]; then
            echo "::error::PORTAINER_API_KEY / SERVER_DEPLOY_PAT not set — image pushed but redeploy skipped."
            exit 1
          fi
          python3 .github/scripts/portainer_deploy.py
