name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Build, vet and unit-test the Go code on all three OSes.
  go:
    name: go (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... -count=1

  # Cross-compile the agent + hub for every release target.
  crosscompile:
    name: cross-compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: build all targets
        run: |
          set -e
          for t in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            export GOOS=${t%/*} GOARCH=${t#*/}
            echo "== $GOOS/$GOARCH =="
            go build -o /dev/null ./sys0-hub
            go build -o /dev/null ./sys0-agent
          done

  # Build the web console (catches TypeScript/Vite errors).
  web:
    name: web console
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: sys0-console
      - run: npm run build
        working-directory: sys0-console

  # End-to-end smoke test against the real binaries (Linux).
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: bash scripts/e2e.sh
